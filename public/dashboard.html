<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — SaaS Starter</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="app-shell">
<header class="nav">
  <a class="brand" href="/dashboard.html">SaaS Starter</a>
  <nav>
    <a href="/pricing.html">Plans</a>
    <button id="logout-btn" class="btn ghost">Log out</button>
  </nav>
</header>

<main class="dash">
  <section class="welcome">
    <h1>Welcome back, <span id="user-name">…</span></h1>
    <p class="muted">You're on the <strong id="user-plan">…</strong> plan.</p>
  </section>

  <section class="stat-grid">
    <div class="stat-card"><div class="stat-label">Projects</div><div class="stat-value">1</div></div>
    <div class="stat-card"><div class="stat-label">API calls (7d)</div><div class="stat-value">0</div></div>
    <div class="stat-card"><div class="stat-label">Active users</div><div class="stat-value">1</div></div>
    <div class="stat-card"><div class="stat-label">Plan</div><div class="stat-value" id="stat-plan">free</div></div>
  </section>

  <section class="upgrade-cta" id="upgrade-cta">
    <div>
      <h2>Ready for more?</h2>
      <p class="muted">Unlock unlimited projects and priority support on Pro.</p>
    </div>
    <a class="btn primary lg" href="/pricing.html">See plans</a>
  </section>
</main>

<script src="/app.js"></script>
<script>app.bindDashboard();</script>
</body>
</html>
