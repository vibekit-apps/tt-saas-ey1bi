<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — SaaS Starter</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-page">
<header class="nav">
  <a class="brand" href="/">SaaS Starter</a>
  <nav>
    <a href="/signup.html">Sign up</a>
  </nav>
</header>

<main class="auth-shell">
  <div class="card">
    <h1>Welcome back</h1>
    <form id="login-form" autocomplete="on">
      <label>Email <input type="email" name="email" required autocomplete="email" /></label>
      <label>Password <input type="password" name="password" required autocomplete="current-password" /></label>
      <button class="btn primary lg" type="submit">Log in</button>
      <div class="form-error" id="login-error" hidden></div>
    </form>
    <p class="muted small">No account yet? <a href="/signup.html">Sign up free</a></p>
  </div>
</main>

<script src="/app.js"></script>
<script>app.bindLoginForm();</script>
</body>
</html>
